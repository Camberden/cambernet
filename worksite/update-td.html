<form id="update-td-form" class="cmbr-flexfixed" :hx-put="'/api/todos/' + selectedTodoId" hx-trigger="submit"
	hx-target="#alter-todos" hx-swap="innerHTML" x-effect="htmx.process($el)">
	<h2 class="marker-green">Update Todopost</h2>
	<hr class=" hr-cmbr-dark-gradient">
	<hr class="hr-groove-top">
	<div class="grid-col-1-3-1">
		<label for="updateTdInfo" x-text="'Update'"></label>
		<input type="text" id="updateTdInfo" name="updateTdInfo" placeholder="" required
			x-effect="$el.setAttribute('placeholder', selectedTodoInfo); htmx.process($el)">
		<wbr>
	</div>
	<hr class="hr-groove-bottom">
	<hr class="hr-cmbr-dark-gradient">
	<div class="grid-col-1-3-1">
		<wbr>
		<button type="submit" x-text="'Update Td'" cmbr-i></button>
		<wbr>
	</div>
</form>
